<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔬 Research Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a2e;
        --panel2: #0f1526;
        --line: #243049;
        --text: #e6ebf5;
        --muted: #93a0bd;
        --accent: #6ea8fe;
        --accent2: #8b5cf6;
        --good: #34d399;
        --warn: #fbbf24;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: radial-gradient(1200px 600px at 70% -10%, #1b2748 0%, var(--bg) 55%);
        color: var(--text);
        font: 15px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
      header h1 { margin: 0; font-size: 26px; letter-spacing: -0.02em; }
      header p { margin: 4px 0 0; color: var(--muted); }
      .accent { background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; background-clip: text; color: transparent; }

      form {
        margin: 24px 0 0; background: var(--panel); border: 1px solid var(--line);
        border-radius: 16px; padding: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      }
      textarea {
        width: 100%; resize: vertical; min-height: 56px; background: var(--panel2);
        color: var(--text); border: 1px solid var(--line); border-radius: 10px;
        padding: 12px 14px; font: inherit; outline: none;
      }
      textarea:focus { border-color: var(--accent); }
      .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 12px; }
      .field { display: flex; flex-direction: column; gap: 3px; }
      .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
      select, input[type=text] {
        background: var(--panel2); color: var(--text); border: 1px solid var(--line);
        border-radius: 9px; padding: 7px 10px; font: inherit; outline: none;
      }
      select:focus, input:focus { border-color: var(--accent); }
      .grow { flex: 1; min-width: 160px; }
      button {
        margin-left: auto; align-self: end; background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white; border: 0; border-radius: 10px; padding: 10px 20px; font-weight: 600;
        font-size: 15px; cursor: pointer;
      }
      button:disabled { opacity: .5; cursor: progress; }

      #status { margin: 18px 0 0; min-height: 22px; color: var(--muted); font-size: 13px; }
      #progress { margin: 6px 0 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px; color: var(--muted); white-space: pre-wrap; }
      .pulse::after { content: '▍'; animation: blink 1s steps(2) infinite; color: var(--accent); }
      @keyframes blink { 50% { opacity: 0; } }

      #report {
        margin-top: 18px; background: var(--panel); border: 1px solid var(--line);
        border-radius: 16px; padding: 8px 26px 22px; display: none;
      }
      #report.show { display: block; }
      #report h1, #report h2, #report h3 { letter-spacing: -0.01em; }
      #report h2 { border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-top: 26px; }
      #report a { color: var(--accent); text-decoration: none; word-break: break-word; }
      #report a:hover { text-decoration: underline; }
      #report code { background: var(--panel2); padding: 2px 5px; border-radius: 5px; }
      #report blockquote { border-left: 3px solid var(--accent2); margin: 0; padding-left: 14px; color: var(--muted); }

      .footer { margin-top: 14px; font-size: 12.5px; color: var(--muted); display: none; }
      .footer.show { display: flex; gap: 14px; flex-wrap: wrap; }
      .badge { background: var(--panel2); border: 1px solid var(--line); padding: 4px 10px; border-radius: 999px; }
      .warn { color: var(--warn); border-color: var(--warn); }
      .examples { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
      .chip { background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
        padding: 6px 11px; border-radius: 999px; font-size: 12.5px; cursor: pointer; }
      .chip:hover { color: var(--text); border-color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>🔬 <span class="accent">Research Agent</span></h1>
        <p>Ask a question — Claude researches it live on the web and writes a cited report.</p>
      </header>

      <form id="form">
        <textarea id="q" placeholder="e.g. What changed in the 2026 EU AI Act enforcement timeline?"></textarea>
        <div class="controls">
          <div class="field">
            <label>Mode</label>
            <select id="mode">
              <option value="quick">Quick</option>
              <option value="deep">Deep (parallel sub-agents)</option>
            </select>
          </div>
          <div class="field">
            <label>Budget</label>
            <select id="budget">
              <option value="lite">Lite</option>
              <option value="standard" selected>Standard</option>
              <option value="thorough">Thorough</option>
            </select>
          </div>
          <div class="field">
            <label>Effort</label>
            <select id="effort">
              <option value="">Auto</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="xhigh">X-High</option>
              <option value="max">Max</option>
            </select>
          </div>
          <div class="field grow">
            <label>Domains (allow-list, optional)</label>
            <input id="domains" type="text" placeholder="react.dev, github.com" />
          </div>
          <button id="run" type="submit">Research</button>
        </div>
      </form>

      <div class="examples" id="examples">
        <span class="chip">Latest stable Node.js LTS and its support timeline</span>
        <span class="chip">State of solid-state EV batteries in 2026</span>
        <span class="chip">How does Postgres logical replication handle schema changes?</span>
      </div>

      <div id="status"></div>
      <div id="progress"></div>

      <article id="report"></article>
      <div class="footer" id="footer"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
